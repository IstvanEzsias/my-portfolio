version: '3.8'

services:
  backend:
    build: ./backend
    restart: unless-stopped
    ports:
      - "127.0.0.1:3001:3001"
    environment:
      - NODE_ENV=production
      - PORT=3001
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - CORS_ORIGIN=https://magicisreal.club
      - DB_PATH=/app/data/mir.db
    volumes:
      - mir_data:/app/data
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  mir_data:
    driver: local
